# config/config.yaml
Server:
  port: 8081
  env: dev
  storagePath: /Users/xugang/workspace/go-cloud-storage/upload

Database:
  host: 127.0.0.1
  port: 3306
  user: root
  password: 167219
  dbname: file-store
  maxOpenConns: 100
  maxIdleConns: 20
  connMaxLifetime: 1h
  connMaxIdleTime: 10m
  logLevel: info  # silent, error, warn, info

Redis:
  enabled: true
  host: 127.0.0.1
  port: 6379
  password: 167219
  db: 0
  poolSize: 10

rabbitmq:
  enabled: false
  url: "amqp://guest:guest@127.0.0.1:5672/"
  exchange: "recycle.exchange"
  queue: "recycle.expired.queue"
  routingKey: "recycle.expired"
  consumerTag: "recycle-cleanup-worker"
  scanIntervalSeconds: 60

# 阿里云oss配置
AliyunOss:
  Host: https://go-cloud-store.oss-cn-shenzhen.aliyuncs.com     # 阿里云OSS资源外网访问地址
  Bucket: go-cloud-store                                        # 阿里云OSS bucket名称
  Endpoint: oss-cn-shenzhen.aliyuncs.com                        # 阿里云OSS Endpoint
  AccessId:                                                     # 阿里云OSS accessID
  AccessSecret:                                                 # 阿里云OSS accessKey
  Region: cn-shenzhen                                           # 区域


storageType: "minio"
minio:
  endpoint: "127.0.0.1:9000"
  accessKeyID: "admin"
  secretAccessKey: "admin123"
  bucket: "go-cloud-storage"
  useSSL: false
  region: "us-east-1"
